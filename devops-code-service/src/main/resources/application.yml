server:
  port: ${SERVICE_PORT:9010}

spring:
  application:
    name: devops-code-service

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  config:
    import:
      - optional:nacos:${spring.application.name}-${SPRING_PROFILES_ACTIVE:dev}

  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:192.168.199.107:8848}
      discovery:
        server-addr: ${spring.cloud.nacos.server-addr}
      config:
        server-addr: ${spring.cloud.nacos.server-addr}
        file-extension: yml
