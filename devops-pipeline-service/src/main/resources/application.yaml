server:
  port: ${SERVER_PORT:9040}

spring:
  application:
    name: devops-pipeline-service

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  config:
    import:
      - optional:nacos:${spring.application.name}-${spring.profiles.active}.yml

  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:192.168.199.107:8848}
      discovery:
        server-addr: ${spring.cloud.nacos.server-addr}
        ip: ${NACOS_DISCOVERY_IP:}
      config:
        server-addr: ${spring.cloud.nacos.server-addr}
        file-extension: yml